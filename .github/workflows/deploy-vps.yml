name: Build and Deploy to VPS Branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-vps:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Bun 🥟
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and Build 🔧
        run: |
          bun install
          bun run build
        env:
          VITE_BASE: /
          VITE_SITE_URL: https://0day.ajmalbuv.duckdns.org/

      - name: Deploy to VPS Branch 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: vps-deploy
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
